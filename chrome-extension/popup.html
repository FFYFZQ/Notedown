<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Notedown Capture</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #efe7d8;
        --card: rgba(255, 252, 245, 0.96);
        --text: #1d1b17;
        --muted: #625b4d;
        --line: rgba(45, 37, 23, 0.12);
        --accent: #0d6f63;
        --accent-strong: #084e46;
        --danger: #a63b32;
      }

      * {
        box-sizing: border-box;
      }

      body {
        width: 380px;
        margin: 0;
        padding: 14px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(13, 111, 99, 0.16), transparent 36%),
          radial-gradient(circle at right, rgba(214, 121, 64, 0.18), transparent 30%),
          linear-gradient(180deg, #efe7d8 0%, var(--bg) 100%);
      }

      .card {
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 16px;
        background: var(--card);
        box-shadow: 0 18px 42px rgba(44, 28, 4, 0.12);
        backdrop-filter: blur(10px);
      }

      h1 {
        margin: 0;
        font: 700 18px/1.2 "Iowan Old Style", "Palatino Linotype", "Noto Serif SC", serif;
      }

      .subtle,
      .source,
      .status {
        margin-top: 8px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .source {
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.68);
        word-break: break-word;
      }

      label {
        display: block;
        margin: 14px 0 6px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: #7a6241;
      }

      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 12px;
        resize: vertical;
        background: rgba(255, 255, 255, 0.82);
        color: var(--text);
        font: inherit;
        line-height: 1.6;
      }

      #quote {
        min-height: 120px;
      }

      #note {
        min-height: 88px;
      }

      .actions {
        display: flex;
        gap: 10px;
        margin-top: 14px;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 10px 14px;
        font: 600 13px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        cursor: pointer;
      }

      .primary {
        color: white;
        background: linear-gradient(135deg, #135c52 0%, #0d7c6e 100%);
      }

      .secondary {
        color: var(--accent-strong);
        background: rgba(13, 111, 99, 0.12);
      }

      .status.error {
        color: var(--danger);
      }
    </style>
  </head>
  <body>
    <section class="card">
      <h1>Notedown Capture</h1>
      <div class="subtle">普通网页可以直接选中保存。PDF 页面请先复制文本，再粘贴到这里。</div>
      <div class="source" id="source">正在读取当前页面信息...</div>

      <label for="quote">引用内容</label>
      <textarea id="quote" placeholder="在 PDF 中先复制你选中的文字，然后粘贴到这里"></textarea>

      <label for="note">问题 / 想法</label>
      <textarea id="note" placeholder="例如：这段和我之前的笔记有什么关系？"></textarea>

      <div class="actions">
        <button class="primary" id="save" type="button">保存</button>
        <button class="secondary" id="open-settings" type="button">设置</button>
      </div>

      <div class="status" id="status"></div>
    </section>

    <script src="popup.js"></script>
  </body>
</html>
